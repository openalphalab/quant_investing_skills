[pytest]
# importlib mode lets pytest collect tests from sibling skill folders that
# share filenames (e.g. each skill has its own tests/test_smoke.py) without
# the package-name collision the legacy "prepend" mode causes.
addopts = --import-mode=importlib
testpaths =
    .claude/skills/fetching-fund-universe/tests
    .claude/skills/classifying-industry/tests
